<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MrNic5Guy: Wasteland Runners</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">W</div>
      <div class="titles">
        <div class="title">MrNic5Guy: Wasteland Runners</div>
        <div class="subtitle">Run • Gun • Momentum</div>
      </div>
    </div>

    <div class="hud">
      <div class="hudItem"><span>HP</span><b id="hpText">100</b></div>
      <div class="hudItem"><span>Ammo</span><b id="ammoText">∞</b></div>
      <div class="hudItem"><span>Gren</span><b id="grenText">3</b></div>
      <div class="hudItem"><span>Score</span><b id="scoreText">0</b></div>
      <div class="hudItem"><span>Wave</span><b id="waveText">1</b></div>
    </div>
  </header>

  <main class="wrap">
    <div class="gameShell">
      <canvas id="game" width="960" height="540"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="panelTitle">Touch Controls (iPhone)</div>
          <ul>
            <li><b>Left pad</b>: move</li>
            <li><b>Right buttons</b>: Jump / Shoot / Grenade / Dash</li>
            <li><b>Slide</b>: Slide button</li>
          </ul>
          <div class="panelHint">Tip: keep moving to build <b>Momentum</b> for faster fire + shorter dash cooldown.</div>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <!-- Mobile controls -->
      <div class="touchUI" id="touchUI" aria-hidden="true">
        <div class="pad" id="pad">
          <button class="padBtn" id="btnLeft">◀</button>
          <button class="padBtn" id="btnRight">▶</button>
        </div>

        <div class="btnCluster">
          <button class="actBtn" id="btnJump">JUMP</button>
          <button class="actBtn" id="btnShoot">SHOOT</button>
          <button class="actBtn" id="btnGren">GREN</button>
          <button class="actBtn" id="btnDash">DASH</button>
          <button class="actBtn" id="btnSlide">SLIDE</button>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
