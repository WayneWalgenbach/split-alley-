<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MrNic5Guy: Wasteland Runners</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">W</div>
      <div>
        <div class="title">MrNic5Guy: Wasteland Runners</div>
        <div class="subtitle">Run • Gun • Boom</div>
      </div>
    </div>
    <div class="hud">
      <div class="hudItem"><span>HP</span><b id="hpText">100</b></div>
      <div class="hudItem"><span>Ammo</span><b id="ammoText">∞</b></div>
      <div class="hudItem"><span>Gren</span><b id="grenText">3</b></div>
      <div class="hudItem"><span>Score</span><b id="scoreText">0</b></div>
      <div class="hudItem"><span>Wave</span><b id="waveText">1</b></div>
    </div>
  </header>

  <main class="wrap">
    <div class="gameShell">
      <canvas id="game" width="960" height="540"></canvas>

      <div id="overlay" class="overlay">
        <div class="panel">
          <div id="panelTitle" class="panelTitle">Touch Controls (iPhone)</div>
          <ul>
            <li><b>Left pad</b>: move</li>
            <li><b>Right buttons</b>: Jump / Shoot / Grenade / Dash</li>
            <li><b>Slide</b>: Slide button</li>
          </ul>
          <div class="panelHint">Tip: keep moving to build Momentum.</div>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <div id="toast" class="toast"></div>

      <div id="touchUI" class="touchUI">
        <div class="pad">
          <button id="btnLeft" class="padBtn">◀</button>
          <button id="btnRight" class="padBtn">▶</button>
        </div>
        <div class="btnCluster">
          <button id="btnJump" class="actBtn">JUMP</button>
          <button id="btnShoot" class="actBtn">SHOOT</button>
          <button id="btnGren" class="actBtn">GREN</button>
          <button id="btnDash" class="actBtn">DASH</button>
          <button id="btnSlide" class="actBtn">SLIDE</button>
        </div>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
